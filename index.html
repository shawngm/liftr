<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Liftr Lounge</title>
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.88);
            --ios-blue: #007aff;
            --ios-dark: #1c1c1e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            background-size: cover; background-position: center; background-attachment: fixed;
            transition: background 1s ease-in-out;
            -webkit-font-smoothing: antialiased;
            color: #fff;
        }

        /* THEME OVERLAY */
        .overlay-dim { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: -1; }

        .header-nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding-top: env(safe-area-inset-top, 40px);
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .logo-container { padding: 15px 20px 5px; text-align: center; }
        .app-logo { height: 40px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        .tabs { display: flex; overflow-x: auto; padding: 15px 20px; gap: 10px; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn {
            border: none; background: rgba(255, 255, 255, 0.15);
            padding: 10px 18px; font-size: 13px; font-weight: 700;
            border-radius: 20px; color: #fff; white-space: nowrap; transition: 0.3s;
        }
        .tab-btn.active { background: #fff; color: #000; transform: scale(1.05); }

        .container { padding: 20px 20px 120px; }

        /* VIBE CARD */
        .vibe-card {
            background: var(--glass); border-radius: 28px; padding: 25px; margin-bottom: 25px;
            color: #000; box-shadow: 0 15px 35px rgba(0,0,0,0.3); backdrop-filter: blur(10px);
        }
        .vibe-label { font-size: 10px; font-weight: 900; color: var(--ios-blue); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }
        .quote { font-size: 18px; font-weight: 700; font-style: italic; line-height: 1.4; margin-bottom: 15px; }
        .spotify-link {
            display: inline-flex; align-items: center; gap: 8px; background: #1DB954; color: #fff;
            text-decoration: none; padding: 10px 20px; border-radius: 25px; font-weight: 800; font-size: 13px;
        }

        /* GRID */
        .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .shortcut-card {
            background: var(--glass); padding: 25px 15px; border-radius: 24px;
            color: #000; text-align: center; font-weight: 800; border: 1px solid rgba(255,255,255,0.5);
        }

        /* EXERCISE CARDS */
        .exercise-card { background: #fff; border-radius: 24px; padding: 20px; margin-bottom: 15px; color: #000; }
        .ex-header { font-size: 18px; font-weight: 800; margin-bottom: 15px; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; background: #f2f2f7; border: none; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: 600; }

        .finish-btn { background: #000; color: #fff; border: none; padding: 20px; border-radius: 20px; font-weight: 800; font-size: 18px; width: 100%; margin-top: 20px; }

        /* VICTORY OVERLAY */
        #victoryOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        #victoryBadge { width: 80%; max-width: 300px; margin-bottom: 20px; transform: scale(0.5); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .history-card { background: var(--glass); padding: 20px; border-radius: 20px; margin-bottom: 15px; color: #000; }
    </style>
</head>
<body>

<div class="overlay-dim"></div>

<div class="header-nav">
    <div class="logo-container">
        <img src="logo.png" class="app-logo" alt="Liftr Lounge">
    </div>
    <div class="tabs" id="tabBar">
        <button class="tab-btn active" onclick="showView('Home')">Lounge</button>
        <button class="tab-btn" onclick="showView('Chest & Shoulders')">Chest</button>
        <button class="tab-btn" onclick="showView('Legs & Glutes')">Legs</button>
        <button class="tab-btn" onclick="showView('Arms')">Arms</button>
        <button class="tab-btn" onclick="showView('Back/Shoulders/Core')">Back</button>
        <button class="tab-btn" onclick="showView('History')">History</button>
    </div>
</div>

<div class="container" id="content"></div>

<div id="victoryOverlay">
    <img src="" id="victoryBadge" alt="Badge">
    <h1 style="color:gold;">SESSION CRUSHED</h1>
    <p style="color:#fff;">Strength built. Mind centered.</p>
</div>

<script>
    const themes = {
        1: { name: "80s Arena Rock", bg: "bg1.jpg", badge: "badge1.png", playlist: "https://open.spotify.com/playlist/17BNbtuYjcjLjKF1mMXKpx?si=ba92dcfce1f749f5", quote: "“What stands in the way becomes the way.” — Marcus Aurelius" },
        2: { name: "Vaporwave / Lo-Fi", bg: "bg2.jpg", badge: "badge2.png", playlist: "https://open.spotify.com/playlist/4AH6HqwasXyLwaeDLvaHFv?si=45c9f9d9c7284810", quote: "“For God hath not given us the spirit of fear; but of power, and of love, and of a sound mind.” — 2 Timothy 1:7" },
        3: { name: "Heavenly Strength", bg: "bg3.jpg", badge: "badge3.png", playlist: "https://open.spotify.com/playlist/7CSCzfrGrTT1j1ie3n3HOf?si=41c6d0ac9b9347fe", quote: "\"God arms me with strength, and he makes my way perfect\" - Psalm 18:32" },
        4: { name: "Industrial Tech", bg: "bg4.jpg", badge: "badge4.png", playlist: "https://open.spotify.com/playlist/0z9tGa8xlumLE8NshMKQBH?si=2e3b0382697a43bf", quote: "“No man is free who is not master of himself.” — Epictetus" },
        5: { name: "Moody Nature / Zen", bg: "bg5.jpg", badge: "badge5.png", playlist: "https://open.spotify.com/playlist/0z9tGa8xlumLE8NshMKQBH?si=2e3b0382697a43bf", quote: "\"No discipline is enjoyable while it is happening—it’s painful! But afterward there will be a peaceful harvest...\" - Hebrews 12:11" }
    };

    const routines = {
        "Chest & Shoulders": [
            { name: "Incline Bench Press", target: "3x10", start: "35 lbs" },
            { name: "Close-Grip Chest Press", target: "3x8", start: "25-30 lbs" },
            { name: "Front Military Press", target: "3x10", start: "50-60 lbs" },
            { name: "Dumbbell Fly", target: "3x10", start: "20-25 lbs" },
            { name: "Lateral Raise Machine", target: "3 sets", start: "50 lbs" },
            { name: "Pectoral Machine", target: "3x10", start: "210 lbs" },
            { name: "Incline Bench Machine", target: "3x8", start: "90+ lbs" },
            { name: "Cable Chest Press", target: "3x8", start: "33 lbs" },
            { name: "Low Row", target: "3x10", start: "90 lbs" },
            { name: "Delts Machine", target: "3x10", start: "60 lbs" },
            { name: "Vertical Traction Machine", target: "3x10", start: "115 lbs" },
            { name: "Shoulder Press", target: "3x10", start: "60 lbs" }
        ],
        "Legs & Glutes": [
            { name: "Leg Press", target: "4x10", start: "4x45 lbs" },
            { name: "Rear Kick Machine", target: "4x10", start: "100 lbs" },
            { name: "Squat", target: "3x10", start: "70 lbs" },
            { name: "Leg Extensions", target: "3x10", start: "115 lbs" },
            { name: "Stairs", target: "15-20 min", start: "Level 6-8" }
        ],
        "Arms": [
            { name: "Zottman Curls", target: "3x8", start: "25 lbs" },
            { name: "Incline Dumbbell Curl", target: "3x8", start: "30 lbs" },
            { name: "Hammer Curl", target: "3x10", start: "25 lbs" },
            { name: "Tricep Machine", target: "3x10", start: "90 lbs" },
            { name: "Cable Rope Pulldown", target: "3x10", start: "100 lbs" },
            { name: "Preacher Curl Machine", target: "3x8", start: "50 lbs" }
        ],
        "Back/Shoulders/Core": [
            { name: "Cable Row", target: "3 Sets", start: "100 lbs" },
            { name: "Reverse Machine", target: "3 Sets", start: "55 lbs" },
            { name: "Lat Pulldown Bar", target: "3 Sets", start: "85 lbs" },
            { name: "Dorsi Flexor Machine", target: "3 Sets", start: "135 lbs" },
            { name: "Crunches", target: "3 Sets", start: "Body" }
        ]
    };

    function getTheme() {
        const start = new Date('2026-01-01');
        const diff = Math.floor((new Date() - start) / (1000*60*60*24));
        return themes[(diff % 5) + 1];
    }

    function showView(name) {
        const theme = getTheme();
        document.body.style.backgroundImage = `url('${theme.bg}')`;
        
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText === name || (name==='Home' && b.innerText==='Lounge')));
        const container = document.getElementById('content');
        container.innerHTML = '';

        if (name === 'Home') {
            container.innerHTML = `
                <div class="vibe-card">
                    <div class="vibe-label">Today's Vibe: ${theme.name}</div>
                    <div class="quote">${theme.quote}</div>
                    <a href="${theme.playlist}" class="spotify-link">▶ Open Vibe Playlist</a>
                </div>
                <div class="home-grid">
                    <div class="shortcut-card" onclick="showView('Chest & Shoulders')">CHEST</div>
                    <div class="shortcut-card" onclick="showView('Legs & Glutes')">LEGS</div>
                    <div class="shortcut-card" onclick="showView('Arms')">ARMS</div>
                    <div class="shortcut-card" onclick="showView('Back/Shoulders/Core')">BACK</div>
                </div>
            `;
            return;
        }

        if (name === 'History') {
            const hist = JSON.parse(localStorage.getItem('liftr_history') || "[]");
            hist.slice().reverse().forEach(e => {
                container.innerHTML += `<div class="history-card"><strong>${e.date}</strong><br><small>${e.routine}</small><br>${e.summary}</div>`;
            });
            return;
        }

        routines[name].forEach(ex => {
            container.innerHTML += `
                <div class="exercise-card">
                    <div class="ex-header">${ex.name} <span style="font-size:11px; opacity:0.6;">(${ex.target})</span></div>
                    <div class="input-group">
                        <input type="text" placeholder="Lbs" id="w-${ex.name}">
                        <input type="text" placeholder="Notes" id="n-${ex.name}">
                    </div>
                </div>`;
        });
        container.innerHTML += `<button class="finish-btn" onclick="finish('${name}')">Complete Session</button>`;
    }

    function finish(routine) {
        const theme = getTheme();
        let summary = [];
        routines[routine].forEach(ex => {
            const w = document.getElementById(`w-${ex.name}`).value;
            if(w) summary.push(`${ex.name}: ${w}lb`);
        });

        const history = JSON.parse(localStorage.getItem('liftr_history') || "[]");
        history.push({ date: new Date().toLocaleDateString(), routine, summary: summary.join(", ") });
        localStorage.setItem('liftr_history', JSON.stringify(history));

        // SHOW VICTORY
        const overlay = document.getElementById('victoryOverlay');
        const badge = document.getElementById('victoryBadge');
        badge.src = theme.badge;
        overlay.style.display = 'flex';
        setTimeout(() => badge.style.transform = 'scale(1)', 100);

        setTimeout(() => {
            overlay.style.display = 'none';
            badge.style.transform = 'scale(0.5)';
            showView('History');
        }, 3000);
    }

    showView('Home');
</script>
</body>
</html>
