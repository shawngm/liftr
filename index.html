<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Strong Log</title>
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --ios-blue: #007aff;
            --ios-green: #34c759;
            --ios-label: #8e8e93;
            --ios-text: #1c1c1e;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            padding-bottom: 100px;
            -webkit-font-smoothing: antialiased;
        }

        /* High-End Header */
        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 60px 20px 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
        }

        /* Rounded Segmented Control Tabs */
        .tabs {
            display: flex;
            background: #e3e3e8;
            padding: 2px;
            border-radius: 10px;
            margin: 15px 20px;
            gap: 2px;
        }

        .tab-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 8px 0;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            color: #3a3a3c;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn.active {
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            color: #000;
        }

        /* Card Styling */
        .container { padding: 0 20px; }

        .exercise-card {
            background: var(--ios-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 0.5px solid rgba(0,0,0,0.05);
        }

        .ex-name {
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .ex-info {
            font-size: 13px;
            color: var(--ios-label);
            font-weight: 500;
            margin-bottom: 15px;
            display: flex;
            gap: 12px;
        }

        .tag {
            background: #f2f2f7;
            padding: 2px 8px;
            border-radius: 6px;
            color: var(--ios-blue);
        }

        /* Modern Inputs */
        .input-row {
            display: flex;
            gap: 12px;
        }

        .field {
            flex: 1;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--ios-label);
            text-transform: uppercase;
            margin-bottom: 6px;
            margin-left: 2px;
        }

        input {
            width: 100%;
            background: #f2f2f7;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 500;
            box-sizing: border-box;
            outline: none;
            transition: background 0.2s;
        }

        input:focus {
            background: #e5e5ea;
            box-shadow: inset 0 0 0 1px var(--ios-blue);
        }

        /* Action Buttons */
        .finish-btn {
            background: var(--ios-blue);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 17px;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
        }

        .history-item {
            background: white;
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }

        .history-date {
            font-size: 12px;
            font-weight: 700;
            color: var(--ios-blue);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <h1>Gym Log</h1>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="showView('Legs Glutes')">Legs</button>
    <button class="tab-btn" onclick="showView('Upper Push')">Push</button>
    <button class="tab-btn" onclick="showView('Upper Pull')">Pull</button>
    <button class="tab-btn" onclick="showView('Lower Hinge')">Hinge</button>
    <button class="tab-btn" onclick="showView('History')">History</button>
</div>

<div class="container" id="content"></div>

<script>
    const routines = {
        "Legs Glutes": [
            { name: "Glute Leg Press", target: "4x8-10", start: "70-90 lb" },
            { name: "Smith Squat", target: "3x8-10", start: "70 lb" },
            { name: "Glute Kickback", target: "3x10-12", start: "100 lb" },
            { name: "KB Squat Lunge", target: "3x10/leg", start: "45 lb" }
        ],
        "Upper Push": [
            { name: "Incline Bench", target: "3x8-10", start: "35 lb" },
            { name: "Chest Press", target: "3x8-10", start: "90 lb" },
            { name: "Military Press", target: "3x8-10", start: "50-60 lb" }
        ],
        "Upper Pull": [
            { name: "Cable Row", target: "3x8-10", start: "100 lb" },
            { name: "Lat Pulldown", target: "3x8-10", start: "85 lb" },
            { name: "Machine Pullback", target: "3x10", start: "115 lb" }
        ],
        "Lower Hinge": [
            { name: "Romanian DL", target: "4x6-8", start: "70 lb" },
            { name: "Hip Thrust", target: "3x8-10", start: "Moderate" },
            { name: "Leg Curl", target: "3x10-12", start: "Moderate" }
        ]
    };

    function showView(name) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText === name || (name === 'History' && b.innerText === 'History')));
        const container = document.getElementById('content');
        container.innerHTML = '';

        if (name === 'History') {
            const history = JSON.parse(localStorage.getItem('workout_history') || "[]");
            if (history.length === 0) container.innerHTML = "<p style='text-align:center; color:grey; margin-top:50px;'>No sessions recorded yet.</p>";
            history.reverse().forEach(entry => {
                let div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<div class="history-date">${entry.date} • ${entry.routine}</div><p style="margin:8px 0 0; font-size:15px; line-height:1.4;">${entry.summary}</p>`;
                container.appendChild(div);
            });
            return;
        }

        routines[name].forEach(ex => {
            container.innerHTML += `
                <div class="exercise-card">
                    <p class="ex-name">${ex.name}</p>
                    <div class="ex-info">
                        <span class="tag">🎯 ${ex.target}</span>
                        <span class="tag">🚩 ${ex.start}</span>
                    </div>
                    <div class="input-row">
                        <div class="field">
                            <label>Weight</label>
                            <input type="text" id="w-${ex.name}" placeholder="lb">
                        </div>
                        <div class="field">
                            <label>Note</label>
                            <input type="text" id="n-${ex.name}" placeholder="Set details">
                        </div>
                    </div>
                </div>`;
        });
        container.innerHTML += `<button class="finish-btn" onclick="finishWorkout('${name}')">Complete Session</button>`;
    }

    function finishWorkout(routineName) {
        const date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        let summary = [];
        routines[routineName].forEach(ex => {
            const w = document.getElementById(`w-${ex.name}`).value;
            if (w) summary.push(`<b>${ex.name}</b>: ${w}lb`);
        });

        if (summary.length === 0) return alert("Please log at least one lift.");

        const history = JSON.parse(localStorage.getItem('workout_history') || "[]");
        history.push({ date, routine: routineName, summary: summary.join(", ") });
        localStorage.setItem('workout_history', JSON.stringify(history));
        
        showView('History');
    }

    showView('Legs Glutes');
</script>

</body>
</html>
