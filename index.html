<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Gym Tracker</title>
    <style>
        :root { --bg: #f2f2f7; --card: #ffffff; --primary: #007aff; --text: #1c1c1e; --secondary: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; }
        header { padding: 40px 15px 10px; background: var(--card); border-bottom: 1px solid #d1d1d6; position: sticky; top: 0; z-index: 100; }
        .tabs { display: flex; overflow-x: auto; padding: 12px 15px; gap: 8px; background: var(--card); border-bottom: 1px solid #d1d1d6; }
        .tab-btn { background: #e5e5ea; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); color: white; }
        .container { padding: 15px; }
        .exercise-card { background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .ex-name { font-weight: 700; font-size: 18px; margin: 0; }
        .ex-info { font-size: 12px; color: var(--primary); font-weight: 600; margin: 4px 0 10px; }
        .input-row { display: flex; gap: 10px; }
        input { width: 100%; border: 1px solid #ddd; padding: 10px; border-radius: 8px; font-size: 16px; background: #f9f9f9; }
        .finish-btn { background: #4cd964; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; width: 100%; margin-top: 20px; font-size: 17px; }
        .history-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--primary); }
        .history-date { font-weight: 700; font-size: 14px; color: var(--secondary); }
    </style>
</head>
<body>

<header><h1 id="header-title">Gym Log</h1></header>

<div class="tabs">
    <button class="tab-btn active" onclick="showView('Legs Glutes')">Legs</button>
    <button class="tab-btn" onclick="showView('Upper Push')">Push</button>
    <button class="tab-btn" onclick="showView('Upper Pull')">Pull</button>
    <button class="tab-btn" onclick="showView('Lower Hinge')">Hinge</button>
    <button class="tab-btn" onclick="showView('History')">History</button>
</div>

<div class="container" id="content"></div>

<script>
    const routines = {
        "Legs Glutes": [
            { name: "Glute Leg Press", target: "4x8-10", start: "70-90 lb" },
            { name: "Smith Squat", target: "3x8-10", start: "70 lb" },
            { name: "Glute Kickback", target: "3x10-12", start: "100 lb" },
            { name: "KB Squat Lunge", target: "3x10/leg", start: "45 lb" }
        ],
        "Upper Push": [
            { name: "Incline Bench", target: "3x8-10", start: "35 lb" },
            { name: "Chest Press", target: "3x8-10", start: "90 lb" },
            { name: "Military Press", target: "3x8-10", start: "50-60 lb" }
        ],
        "Upper Pull": [
            { name: "Cable Row", target: "3x8-10", start: "100 lb" },
            { name: "Lat Pulldown", target: "3x8-10", start: "85 lb" },
            { name: "Machine Pullback", target: "3x10", start: "115 lb" }
        ],
        "Lower Hinge": [
            { name: "Romanian DL", target: "4x6-8", start: "70 lb" },
            { name: "Hip Thrust", target: "3x8-10", start: "Moderate" },
            { name: "Leg Curl", target: "3x10-12", start: "Moderate" }
        ]
    };

    function showView(name) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText === name || (name === 'History' && b.innerText === 'History')));
        const container = document.getElementById('content');
        container.innerHTML = '';

        if (name === 'History') {
            const history = JSON.parse(localStorage.getItem('workout_history') || "[]");
            if (history.length === 0) container.innerHTML = "<p>No workouts logged yet!</p>";
            history.reverse().forEach(entry => {
                let div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<div class="history-date">${entry.date} - ${entry.routine}</div><p style="margin:5px 0 0; font-size:14px;">${entry.summary}</p>`;
                container.appendChild(div);
            });
            return;
        }

        routines[name].forEach(ex => {
            container.innerHTML += `
                <div class="exercise-card">
                    <p class="ex-name">${ex.name}</p>
                    <p class="ex-info">Target: ${ex.target} | Goal: ${ex.start}</p>
                    <div class="input-row">
                        <input type="text" id="w-${ex.name}" placeholder="Weight">
                        <input type="text" id="n-${ex.name}" placeholder="Note">
                    </div>
                </div>`;
        });
        container.innerHTML += `<button class="finish-btn" onclick="finishWorkout('${name}')">Finish & Save to History</button>`;
    }

    function finishWorkout(routineName) {
        const date = new Date().toLocaleDateString();
        let summary = [];
        routines[routineName].forEach(ex => {
            const w = document.getElementById(`w-${ex.name}`).value;
            if (w) summary.push(`${ex.name}: ${w}lb`);
        });

        if (summary.length === 0) return alert("Enter at least one weight!");

        const history = JSON.parse(localStorage.getItem('workout_history') || "[]");
        history.push({ date, routine: routineName, summary: summary.join(", ") });
        localStorage.setItem('workout_history', JSON.stringify(history));
        
        alert("Workout saved to History!");
        showView('History');
    }

    showView('Legs Glutes');
</script>
</body>
</html>
