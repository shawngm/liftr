<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Liftr Lounge</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.88);
            --glass-dark: rgba(255, 255, 255, 0.96);
            --glass-border: rgba(255, 255, 255, 0.4);
            --ios-blue: #007aff;
            --ios-dark: #1c1c1e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1514241516423-6c0a5e031aa2?q=80&w=687&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER & NAVIGATION BLOCK */
        .header-nav-container {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 0.5px solid rgba(255,255,255,0.15);
            /* Enhanced Notch/Dynamic Island Protection */
            padding-top: env(safe-area-inset-top, 50px);
        }

        .main-headline {
            padding: 10px 25px 5px;
            margin: 0;
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -1.2px;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }

        .tabs { 
            display: flex; 
            overflow-x: auto; 
            padding: 15px 20px; 
            gap: 10px; 
            -webkit-overflow-scrolling: touch; 
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            border: none; background: rgba(255, 255, 255, 0.12);
            padding: 10px 18px; font-size: 13px; font-weight: 700;
            border-radius: 20px; color: rgba(255, 255, 255, 0.8); white-space: nowrap; transition: 0.3s;
        }

        .tab-btn.active { 
            background: #fff; 
            color: #000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
            transform: scale(1.05);
        }

        .container { padding: 20px 20px 120px; }

        /* Lounge Dashboard */
        .welcome-section { padding: 10px 0 30px; text-align: center; }
        .welcome-section p { color: rgba(255,255,255,0.9); font-size: 18px; font-weight: 500; margin-bottom: 25px; }

        .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .shortcut-card {
            background: var(--glass); padding: 22px 10px; border-radius: 24px;
            text-align: center; color: var(--ios-dark); border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .shortcut-card h3 { margin: 8px 0 0; font-size: 16px; font-weight: 800; line-height: 1.2; }
        .last-date { font-size: 9px; font-weight: 800; color: var(--ios-blue); text-transform: uppercase; letter-spacing: 0.5px; }

        /* Exercise Cards */
        .exercise-card { 
            background: var(--glass-dark); 
            border-radius: 24px; padding: 22px; margin-bottom: 20px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); 
            border: 1px solid var(--glass-border);
        }
        .ex-name { font-size: 19px; font-weight: 800; color: #000; margin: 0; line-height: 1.2; }
        .badge { font-size: 10px; font-weight: 800; padding: 5px 10px; border-radius: 8px; text-transform: uppercase; margin-right: 5px; margin-top: 8px; display: inline-block; }
        .badge-blue { background: rgba(0, 122, 255, 0.1); color: var(--ios-blue); }
        .badge-orange { background: rgba(255, 149, 0, 0.1); color: #c67100; }

        .input-row { display: flex; gap: 12px; margin-top: 18px; }
        .field { flex: 1; }
        label { font-size: 10px; font-weight: 800; color: #666; text-transform: uppercase; margin-bottom: 6px; display: block; }
        input { width: 100%; background: #f2f2f7; border: none; padding: 14px; border-radius: 12px; font-size: 17px; font-weight: 600; box-sizing: border-box; }

        .finish-btn { background: #000; color: #fff; border: none; padding: 22px; border-radius: 20px; font-weight: 800; font-size: 18px; width: 100%; margin-top: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }

        .history-item { background: var(--glass-dark); padding: 22px; border-radius: 24px; margin-bottom: 15px; border: 1px solid var(--glass-border); }
    </style>
</head>
<body>

<div class="header-nav-container">
    <h1 class="main-headline">Liftr Lounge</h1>
    <div class="tabs" id="tabBar">
        <button class="tab-btn active" onclick="showView('Home')">Lounge</button>
        <button class="tab-btn" onclick="showView('Chest & Shoulders')">Chest</button>
        <button class="tab-btn" onclick="showView('Legs & Glutes')">Legs</button>
        <button class="tab-btn" onclick="showView('Arms')">Arms</button>
        <button class="tab-btn" onclick="showView('Back/Shoulders/Core')">Back</button>
        <button class="tab-btn" onclick="showView('History')">History</button>
    </div>
</div>

<div class="container" id="content"></div>

<script>
    const routines = {
        "Chest & Shoulders": [
            { name: "Incline Bench Press", target: "3x10", start: "35 lbs" },
            { name: "Close-Grip Chest Press", target: "3x8", start: "25-30 lbs" },
            { name: "Front Military Press", target: "3x10", start: "50-60 lbs" },
            { name: "Dumbbell Fly", target: "3x10", start: "20-25 lbs" },
            { name: "Lateral Raise Machine", target: "3 sets", start: "50 lbs" },
            { name: "Pectoral Machine", target: "3x10", start: "210 lbs" },
            { name: "Incline Bench Machine", target: "3x8", start: "90+ lbs" },
            { name: "Cable Chest Press", target: "3x8", start: "33 lbs" },
            { name: "Low Row", target: "3x10", start: "90 lbs" },
            { name: "Delts Machine", target: "3x10", start: "60 lbs" },
            { name: "Vertical Traction Machine", target: "3x10", start: "115 lbs" },
            { name: "Shoulder Press", target: "3x10", start: "60 lbs" }
        ],
        "Legs & Glutes": [
            { name: "Leg Press", target: "3x10", start: "4x45 lbs" },
            { name: "Glute-Focused Press", target: "2x8", start: "70-90 lbs" },
            { name: "Rear Kick Machine", target: "4x10", start: "100 lbs" },
            { name: "Squat", target: "3x10", start: "70 lbs" },
            { name: "Leg Extensions", target: "3x10", start: "115 lbs" },
            { name: "Kettlebell Squat Lunges", target: "3x10", start: "45 lbs" },
            { name: "Crunches", target: "3x30", start: "Bodyweight" },
            { name: "Mountain Climbers", target: "3x30 sec", start: "Bodyweight" },
            { name: "Stairs", target: "15-20 min", start: "Bodyweight" }
        ],
        "Arms": [
            { name: "Zottman Curls", target: "3x8", start: "25 lbs" },
            { name: "Incline Dumbbell Curl", target: "3x8", start: "30 lbs" },
            { name: "Hammer Curl", target: "3x10", start: "25 lbs" },
            { name: "Tricep Machine", target: "3x10", start: "90 lbs" },
            { name: "Cable Rope Pulldown (A)", target: "3x8", start: "100 lbs" },
            { name: "Cable Rope Pulldown (B)", target: "3x10", start: "88 lbs" },
            { name: "Preacher Curl Machine", target: "3x8", start: "50 lbs" }
        ],
        "Back/Shoulders/Core": [
            { name: "Cable Row", target: "3 Sets", start: "100 lbs" },
            { name: "Reverse Machine", target: "3 Sets", start: "55 lbs" },
            { name: "Stairs", target: "15 min", start: "Bodyweight" },
            { name: "Lying Pulldown / Pullback", target: "3 Sets", start: "115 lbs" },
            { name: "Dorsi Flexor Machine", target: "3 Sets", start: "135 lbs" },
            { name: "Lat Pulldown Bar", target: "3 Sets", start: "85 lbs" },
            { name: "Lateral Raise 504", target: "3 Sets", start: "50 lbs" },
            { name: "Lower Back Lift", target: "3 Sets", start: "--" },
            { name: "Shoulder Press", target: "3 Sets", start: "60 lbs" }
        ]
    };

    function getLastDone(routineName) {
        const history = JSON.parse(localStorage.getItem('workout_history') || "[]");
        const last = history.slice().reverse().find(entry => entry.routine === routineName);
        return last ? last.date : "Not started";
    }

    function showView(name) {
        // Updated Tab Highlight Logic
        document.querySelectorAll('.tab-btn').forEach(btn => {
            const btnText = btn.innerText.toLowerCase();
            const searchName = name.toLowerCase();
            let isActive = false;
            
            if (searchName === 'home' && btnText === 'lounge') isActive = true;
            else if (searchName === 'history' && btnText === 'history') isActive = true;
            else if (searchName.includes(btnText)) isActive = true;
            else if (btnText === 'chest' && searchName.includes('chest')) isActive = true;
            else if (btnText === 'legs' && searchName.includes('legs')) isActive = true;
            else if (btnText === 'back' && searchName.includes('back')) isActive = true;
            
            btn.classList.toggle('active', isActive);
        });

        const container = document.getElementById('content');
        container.innerHTML = '';

        if (name === 'Home') {
            container.innerHTML = `
                <div class="welcome-section">
                    <p>Select your session</p>
                    <div class="home-grid">
                        <div class="shortcut-card" onclick="showView('Chest & Shoulders')">
                            <div class="last-date">${getLastDone('Chest & Shoulders')}</div>
                            <h3>Chest</h3>
                        </div>
                        <div class="shortcut-card" onclick="showView('Legs & Glutes')">
                            <div class="last-date">${getLastDone('Legs & Glutes')}</div>
                            <h3>Legs</h3>
                        </div>
                        <div class="shortcut-card" onclick="showView('Arms')">
                            <div class="last-date">${getLastDone('Arms')}</div>
                            <h3>Arms</h3>
                        </div>
                        <div class="shortcut-card" onclick="showView('Back/Shoulders/Core')">
                            <div class="last-date">${getLastDone('Back/Shoulders/Core')}</div>
                            <h3>Back</h3>
                        </div>
                    </div>
                </div>
            `;
            return;
        }

        if (name === 'History') {
            const history = JSON.parse(localStorage.getItem('workout_history') || "[]");
            if (history.length === 0) container.innerHTML = "<p style='text-align:center; color:#fff; margin-top:50px;'>No sessions logged yet.</p>";
            history.slice().reverse().forEach(entry => {
                container.innerHTML += `
                    <div class="history-item">
                        <div style="font-weight:800; color:#000; font-size:17px;">${entry.date}</div>
                        <div style="font-size:11px; font-weight:800; color:var(--ios-blue); text-transform:uppercase; margin-bottom:8px; letter-spacing:1px;">${entry.routine}</div>
                        <div style="font-size:15px; color:#333; line-height:1.5;">${entry.summary}</div>
                    </div>`;
            });
            return;
        }

        routines[name].forEach(ex => {
            container.innerHTML += `
                <div class="exercise-card">
                    <p class="ex-name">${ex.name}</p>
                    <div>
                        <span class="badge badge
