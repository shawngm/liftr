<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Liftr Lounge</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
            --ios-blue: #007aff;
            --ios-dark: #1c1c1e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* The Background Image */
            background: url('https://images.unsplash.com/photo-1514241516423-6c0a5e031aa2?q=80&w=687&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            -webkit-font-smoothing: antialiased;
        }

        /* Overlay to darken background slightly for better text contrast */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.1);
            z-index: -1;
        }

        header {
            padding: 70px 25px 20px;
        }

        h1 {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin: 0;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* High Visibility Tabs */
        .tabs-wrapper {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 0;
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .tabs {
            display: flex;
            overflow-x: auto;
            padding: 0 20px;
            gap: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            border: none;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 20px;
            color: #fff;
            white-space: nowrap;
            backdrop-filter: blur(5px);
        }

        .tab-btn.active {
            background: #fff;
            color: #000;
            transform: scale(1.05);
        }

        /* Frosted Glass Cards */
        .container { padding: 25px 20px 100px; }

        .exercise-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 22px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .ex-name { font-size: 21px; font-weight: 700; color: #000; margin: 0 0 5px 0; }
        
        .ex-meta { display: flex; gap: 8px; margin-bottom: 20px; }
        
        .badge {
            font-size: 11px;
            font-weight: 800;
            padding: 5px 10px;
            border-radius: 8px;
            text-transform: uppercase;
        }
        .badge-blue { background: rgba(0, 122, 255, 0.15); color: var(--ios-blue); }
        .badge-orange { background: rgba(255, 149, 0, 0.15); color: #c67100; }

        /* Inputs */
        .input-row { display: flex; gap: 12px; }
        .field { flex: 1; }
        label { font-size: 11px; font-weight: 800; color: #555; text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0,0,0,0.05);
            padding: 14px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { background: #fff; border-color: var(--ios-blue); }

        .finish-btn {
            background: var(--ios-dark);
            color: white;
            border: none;
            padding: 22px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 18px;
            width: 100%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-top: 10px;
        }

        .history-item {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 15px;
            border: 1px solid var(--glass-border);
        }

        .history-date { font-weight: 800; color: #000; font-size: 17px; }
    </style>
</head>
<body>

<header>
    <h1>Liftr Lounge</h1>
</header>

<div class="tabs-wrapper">
    <div class="tabs" id="tabBar">
        <button class="tab-btn active" onclick="showView('Legs Glutes')">Legs & Glutes</button>
        <button class="tab-btn" onclick="showView('Upper Push')">Upper Push</button>
        <button class="tab-btn" onclick="showView('Upper Pull')">Upper Pull</button>
        <button class="tab-btn" onclick="showView('Lower Hinge')">Lower Hinge</button>
        <button class="tab-btn" onclick="showView('History')">History</button>
    </div>
</div>

<div class="container" id="content"></div>

<script>
    // [The JavaScript remains identical to maintain functionality]
    const routines = {
        "Legs Glutes": [
            { name: "Glute Leg Press", target: "4x8-10", start: "70-90 lb" },
            { name: "Smith Squat", target: "3x8-10", start: "70 lb" },
            { name: "Glute Kickback", target: "3x10-12", start: "100 lb" },
            { name: "KB Squat Lunge", target: "3x10/leg", start: "45 lb" },
            { name: "Leg Extension", target: "3x10-12", start: "115 lb" }
        ],
        "Upper Push": [
            { name: "Incline Bench", target: "3x8-10", start: "35 lb" },
            { name: "Chest Press", target: "3x8-10", start: "90 lb" },
            { name: "Military Press", target: "3x8-10", start: "50-60 lb" },
            { name: "Lateral Raise", target: "3x10-12", start: "50 lb" }
        ],
        "Upper Pull": [
            { name: "Cable Row", target: "3x8-10", start: "100 lb" },
            { name: "Lat Pulldown", target: "3x8-10", start: "85 lb" },
            { name: "Machine Pullback", target: "3x10", start: "115 lb" },
            { name: "Reverse Fly", target: "3x10-12", start: "55 lb" }
        ],
        "Lower Hinge": [
            { name: "Romanian DL", target: "4x6-8", start: "70 lb" },
            { name: "Hip Thrust", target: "3x8-10", start: "Moderate" },
            { name: "Leg Curl", target: "3x10-12", start: "Moderate" },
            { name: "Walking Lunge", target: "3x10/leg", start: "25-45 lb" }
        ]
    };

    function showView(name) {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === name || (name === 'History' && btn.innerText === 'History'));
        });
        const container = document.getElementById('content');
        container.innerHTML = '';

        if (name === 'History') {
            const history = JSON.parse(localStorage.getItem('workout_history') || "[]");
            if (history.length === 0) container.innerHTML = "<p style='text-align:center; color:#fff; margin-top:40px;'>No sessions yet.</p>";
            history.reverse().forEach(entry => {
                container.innerHTML += `
                    <div class="history-item">
                        <div class="history-date">${entry.date}</div>
                        <div style="font-size:12px; font-weight:700; color:var(--ios-blue); text-transform:uppercase; margin-bottom:8px;">${entry.routine}</div>
                        <div style="font-size:15px; line-height:1.5; color:#000;">${entry.summary}</div>
                    </div>`;
            });
            return;
        }

        routines[name].forEach(ex => {
            container.innerHTML += `
                <div class="exercise-card">
                    <p class="ex-name">${ex.name}</p>
                    <div class="ex-meta">
                        <span class="badge badge-blue">🎯 ${ex.target}</span>
                        <span class="badge badge-orange">🚩 ${ex.start}</span>
                    </div>
                    <div class="input-row">
                        <div class="field">
                            <label>Weight</label>
                            <input type="text" id="w-${ex.name}" placeholder="lb">
                        </div>
                        <div class="field">
                            <label>Notes</label>
                            <input type="text" id="n-${ex.name}" placeholder="Sets">
                        </div>
                    </div>
                </div>`;
        });
        container.innerHTML += `<button class="finish-btn" onclick="finishWorkout('${name}')">Complete Workout</button>`;
    }

    function finishWorkout(routineName) {
        const date = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        let summary = [];
        routines[routineName].forEach(ex => {
            const weightVal = document.getElementById(`w-${ex.name}`).value;
            if (weightVal) summary.push(`<b>${ex.name}</b>: ${weightVal}lb`);
        });
        if (summary.length === 0) return alert("Log a lift before finishing!");
        const history = JSON.parse(localStorage.getItem('workout_history') || "[]");
        history.push({ date, routine: routineName, summary: summary.join(", ") });
        localStorage.setItem('workout_history', JSON.stringify(history));
        showView('History');
        window.scrollTo(0,0);
    }

    showView('Legs Glutes');
</script>
</body>
</html>
